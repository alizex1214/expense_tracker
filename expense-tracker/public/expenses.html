<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses — ExpenseTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex">

  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 z-20 lg:hidden"></div>

  <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-30 transition-transform duration-300 -translate-x-full lg:translate-x-0">
    <div class="p-6 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-lg">💰</div>
        <div>
          <h1 class="font-bold text-white text-sm">ExpenseTrack</h1>
          <p class="text-xs text-slate-500">Personal Finance</p>
        </div>
      </div>
    </div>
    <nav id="sidebar-nav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
    <div class="p-4 border-t border-slate-800">
      <p class="text-xs text-slate-600 text-center">CSC-251 Assignment 4</p>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="sticky top-0 z-10 bg-slate-950/90 backdrop-blur border-b border-slate-800 px-6 py-4 flex items-center gap-4">
      <button id="menu-btn" class="lg:hidden text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex-1">
        <h2 class="font-bold text-lg text-white">All Expenses</h2>
        <p class="text-xs text-slate-500">Manage your spending</p>
      </div>
      <button onclick="openAddModal()" class="flex items-center gap-2 bg-sky-500 hover:bg-sky-400 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Expense
      </button>
    </header>

    <main class="flex-1 p-6 space-y-5">
      <!-- Filters -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 fade-in">
        <div class="flex flex-wrap gap-3 items-center">
          <div class="flex-1 min-w-32">
            <select id="filter-category" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="flex-1 min-w-32">
            <input id="filter-month" type="month" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500" />
          </div>
          <div class="flex-1 min-w-32">
            <select id="filter-sort" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500">
              <option value="">Newest First</option>
              <option value="desc">Highest Amount</option>
              <option value="asc">Lowest Amount</option>
            </select>
          </div>
          <button onclick="applyFilters()" class="bg-sky-500/20 hover:bg-sky-500/30 text-sky-400 border border-sky-500/30 px-4 py-2 rounded-xl text-sm font-medium transition-colors">
            🔍 Filter
          </button>
          <button onclick="clearFilters()" class="bg-slate-800 hover:bg-slate-700 text-slate-400 px-4 py-2 rounded-xl text-sm font-medium transition-colors">
            ✕ Clear
          </button>
        </div>
      </div>

      <!-- Summary bar -->
      <div class="flex items-center justify-between bg-slate-900/50 rounded-xl px-4 py-3 border border-slate-800 fade-in">
        <span class="text-sm text-slate-400"><span id="exp-count">0</span> expenses</span>
        <span class="text-sm font-semibold text-white">Total: <span class="text-sky-400 mono" id="exp-total">—</span></span>
      </div>

      <!-- Expenses list -->
      <div id="expenses-list" class="space-y-3 fade-in-delay-1"></div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="expense-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black/70 p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-bold text-lg text-white" id="modal-title">Add Expense</h3>
        <button onclick="closeModal()" class="text-slate-500 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="expense-form" class="space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-xs text-slate-400 mb-1 font-medium">Title *</label>
          <input id="m-title" type="text" required placeholder="e.g. Grocery shopping"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 placeholder-slate-600" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-slate-400 mb-1 font-medium">Amount (Rs) *</label>
            <input id="m-amount" type="number" min="1" required placeholder="0"
              class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 placeholder-slate-600" />
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1 font-medium">Date *</label>
            <input id="m-date" type="date" required
              class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1 font-medium">Category *</label>
          <select id="m-category" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500">
            <option value="">Select category</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1 font-medium">Note</label>
          <textarea id="m-note" rows="2" placeholder="Optional details..."
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 placeholder-slate-600 resize-none"></textarea>
        </div>
        <button type="submit" id="modal-submit-btn"
          class="w-full bg-sky-500 hover:bg-sky-400 text-white py-3 rounded-xl font-semibold transition-colors text-sm">
          Add Expense
        </button>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black/70 p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-6 text-center">
      <div class="text-4xl mb-3">🗑️</div>
      <h3 class="font-bold text-lg text-white mb-2">Delete Expense?</h3>
      <p class="text-slate-400 text-sm mb-5">This action cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="document.getElementById('delete-modal').classList.add('hidden')"
          class="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-2.5 rounded-xl font-medium text-sm transition-colors">Cancel</button>
        <button id="confirm-delete-btn"
          class="flex-1 bg-red-500 hover:bg-red-400 text-white py-2.5 rounded-xl font-medium text-sm transition-colors">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed top-5 right-5 z-50 px-5 py-3 rounded-xl text-white font-medium shadow-2xl bg-emerald-500"></div>
  <script src="/js/app.js"></script>
  <script>
    // Populate selects
    ['filter-category', 'm-category'].forEach(id => {
      const el = document.getElementById(id);
      if (id === 'filter-category') el.innerHTML = '<option value="">All Categories</option>';
      CATEGORIES.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = `${CAT_ICONS[c]} ${c}`;
        el.appendChild(o);
      });
    });
    document.getElementById('filter-month').value = currentMonth();
    document.getElementById('m-date').value = new Date().toISOString().slice(0,10);

    let currentFilters = { month: currentMonth() };

    async function loadExpenses() {
      const params = new URLSearchParams();
      if (currentFilters.category) params.set('category', currentFilters.category);
      if (currentFilters.month) params.set('month', currentFilters.month);
      if (currentFilters.sort) params.set('sort', currentFilters.sort);

      try {
        const res = await apiFetch(`/api/expenses?${params}`);
        const { data, count, total } = res;
        document.getElementById('exp-count').textContent = count;
        document.getElementById('exp-total').textContent = formatCurrency(total);

        const list = document.getElementById('expenses-list');
        list.innerHTML = data.length ? data.map(e => `
          <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-4 hover:border-slate-700 transition-colors card-glow" data-id="${e._id}">
            <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
              style="background:${CAT_COLORS[e.category] || '#94a3b8'}22">
              ${CAT_ICONS[e.category] || '📦'}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <p class="font-semibold text-white truncate">${e.title}</p>
                  <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${CAT_COLORS[e.category] || '#94a3b8'}22;color:${CAT_COLORS[e.category] || '#94a3b8'}">${e.category}</span>
                    <span class="text-xs text-slate-500">${formatDate(e.date)}</span>
                  </div>
                  ${e.note ? `<p class="text-xs text-slate-500 mt-1 truncate">${e.note}</p>` : ''}
                </div>
                <div class="text-right flex-shrink-0">
                  <p class="font-bold text-white mono">${formatCurrency(e.amount)}</p>
                </div>
              </div>
            </div>
            <div class="flex flex-col gap-2 flex-shrink-0">
              <button onclick="openEditModal('${e._id}')" class="w-8 h-8 rounded-lg bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 flex items-center justify-center transition-colors text-sm">✏️</button>
              <button onclick="confirmDelete('${e._id}')" class="w-8 h-8 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 flex items-center justify-center transition-colors text-sm">🗑️</button>
            </div>
          </div>
        `).join('') : `
          <div class="text-center py-16 text-slate-600">
            <p class="text-4xl mb-3">💸</p>
            <p class="font-medium">No expenses found</p>
            <p class="text-sm mt-1">Try adjusting your filters or add a new expense.</p>
          </div>`;
      } catch(err) {
        showToast('Failed to load expenses', 'error');
      }
    }

    function applyFilters() {
      currentFilters = {
        category: document.getElementById('filter-category').value,
        month: document.getElementById('filter-month').value,
        sort: document.getElementById('filter-sort').value
      };
      loadExpenses();
    }

    function clearFilters() {
      document.getElementById('filter-category').value = '';
      document.getElementById('filter-month').value = currentMonth();
      document.getElementById('filter-sort').value = '';
      currentFilters = { month: currentMonth() };
      loadExpenses();
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Add Expense';
      document.getElementById('modal-submit-btn').textContent = 'Add Expense';
      document.getElementById('edit-id').value = '';
      document.getElementById('expense-form').reset();
      document.getElementById('m-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('expense-modal').classList.remove('hidden');
    }

    async function openEditModal(id) {
      try {
        const res = await apiFetch(`/api/expenses/${id}`);
        const e = res.data;
        document.getElementById('modal-title').textContent = 'Edit Expense';
        document.getElementById('modal-submit-btn').textContent = 'Save Changes';
        document.getElementById('edit-id').value = e._id;
        document.getElementById('m-title').value = e.title;
        document.getElementById('m-amount').value = e.amount;
        document.getElementById('m-date').value = e.date;
        document.getElementById('m-category').value = e.category;
        document.getElementById('m-note').value = e.note || '';
        document.getElementById('expense-modal').classList.remove('hidden');
      } catch(err) {
        showToast('Failed to load expense', 'error');
      }
    }

    function closeModal() {
      document.getElementById('expense-modal').classList.add('hidden');
    }

    let deleteTarget = null;
    function confirmDelete(id) {
      deleteTarget = id;
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!deleteTarget) return;
      try {
        await apiFetch(`/api/expenses/${deleteTarget}`, { method: 'DELETE' });
        showToast('Expense deleted');
        document.getElementById('delete-modal').classList.add('hidden');
        deleteTarget = null;
        loadExpenses();
      } catch(err) {
        showToast(err.message || 'Delete failed', 'error');
      }
    });

    document.getElementById('expense-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const body = {
        title: document.getElementById('m-title').value,
        amount: document.getElementById('m-amount').value,
        category: document.getElementById('m-category').value,
        date: document.getElementById('m-date').value,
        note: document.getElementById('m-note').value
      };
      try {
        if (id) {
          await apiFetch(`/api/expenses/${id}`, { method: 'PUT', body: JSON.stringify(body) });
          showToast('Expense updated! ✅');
        } else {
          await apiFetch('/api/expenses', { method: 'POST', body: JSON.stringify(body) });
          showToast('Expense added! 🎉');
        }
        closeModal();
        loadExpenses();
      } catch(err) {
        showToast(err.message || 'Save failed', 'error');
      }
    });

    loadExpenses();
  </script>
</body>
</html>
