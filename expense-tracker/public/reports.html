<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — ExpenseTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex">

  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 z-20 lg:hidden"></div>

  <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-30 transition-transform duration-300 -translate-x-full lg:translate-x-0">
    <div class="p-6 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-lg">💰</div>
        <div>
          <h1 class="font-bold text-white text-sm">ExpenseTrack</h1>
          <p class="text-xs text-slate-500">Personal Finance</p>
        </div>
      </div>
    </div>
    <nav id="sidebar-nav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
    <div class="p-4 border-t border-slate-800">
      <p class="text-xs text-slate-600 text-center">CSC-251 Assignment 4</p>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="sticky top-0 z-10 bg-slate-950/90 backdrop-blur border-b border-slate-800 px-6 py-4 flex items-center gap-4">
      <button id="menu-btn" class="lg:hidden text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex-1">
        <h2 class="font-bold text-lg text-white">Reports & Analytics</h2>
        <p class="text-xs text-slate-500">Visual spending insights</p>
      </div>
      <div>
        <input id="report-month" type="month"
          class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500" />
      </div>
    </header>

    <main class="flex-1 p-6 space-y-6">
      <!-- Stats row -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 fade-in" id="report-stats"></div>

      <!-- Charts -->
      <div class="grid lg:grid-cols-2 gap-6">
        <!-- Doughnut chart -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 fade-in-delay-1">
          <h3 class="font-semibold text-white mb-4">🥧 Spending by Category</h3>
          <div class="relative h-64 flex items-center justify-center">
            <canvas id="donut-chart"></canvas>
          </div>
        </div>

        <!-- Bar chart -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 fade-in-delay-2">
          <h3 class="font-semibold text-white mb-4">📊 Category Comparison</h3>
          <div class="relative h-64">
            <canvas id="bar-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Expense table -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 fade-in-delay-3">
        <h3 class="font-semibold text-white mb-4">📋 All Expenses This Month</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-500 text-xs uppercase tracking-wider border-b border-slate-800">
                <th class="pb-3 text-left font-medium">Title</th>
                <th class="pb-3 text-left font-medium">Category</th>
                <th class="pb-3 text-left font-medium">Date</th>
                <th class="pb-3 text-right font-medium">Amount</th>
              </tr>
            </thead>
            <tbody id="report-table" class="divide-y divide-slate-800/50"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="fixed top-5 right-5 z-50 px-5 py-3 rounded-xl text-white font-medium shadow-2xl bg-emerald-500"></div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('report-month').value = currentMonth();
    let donutChart, barChart;

    async function loadReport() {
      const month = document.getElementById('report-month').value;
      try {
        const [summaryRes, expRes] = await Promise.all([
          apiFetch(`/api/expenses/summary?month=${month}`),
          apiFetch(`/api/expenses?month=${month}`)
        ]);
        const s = summaryRes.data;
        const expenses = expRes.data;
        const days = new Date(month.split('-')[0], month.split('-')[1], 0).getDate();
        const avg = s.total / days;

        // Stats cards
        document.getElementById('report-stats').innerHTML = [
          { label: 'Total Spent', value: formatCurrency(s.total), color: 'text-white', icon: '💳' },
          { label: 'No. of Expenses', value: s.count, color: 'text-sky-400', icon: '📝' },
          { label: 'Daily Average', value: formatCurrency(Math.round(avg)), color: 'text-emerald-400', icon: '📅' },
          { label: 'Categories Used', value: Object.keys(s.byCategory).length, color: 'text-purple-400', icon: '🏷️' }
        ].map(card => `
          <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
            <p class="text-slate-500 text-xs mb-2">${card.icon} ${card.label}</p>
            <p class="text-2xl font-bold ${card.color} mono">${card.value}</p>
          </div>`).join('');

        // Charts
        const cats = Object.keys(s.byCategory);
        const vals = Object.values(s.byCategory);
        const colors = cats.map(c => CAT_COLORS[c] || '#94a3b8');

        if (donutChart) donutChart.destroy();
        if (barChart) barChart.destroy();

        const donutCtx = document.getElementById('donut-chart').getContext('2d');
        donutChart = new Chart(donutCtx, {
          type: 'doughnut',
          data: { labels: cats.map(c => `${CAT_ICONS[c]} ${c}`), datasets: [{ data: vals, backgroundColor: colors, borderColor: '#0f172a', borderWidth: 3 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 12, boxWidth: 12 } },
              tooltip: { callbacks: { label: ctx => ` ${formatCurrency(ctx.raw)}` } }
            }
          }
        });

        const barCtx = document.getElementById('bar-chart').getContext('2d');
        barChart = new Chart(barCtx, {
          type: 'bar',
          data: { labels: cats.map(c => `${CAT_ICONS[c]} ${c}`), datasets: [{ label: 'Amount (Rs)', data: vals, backgroundColor: colors, borderRadius: 8, borderSkipped: false }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${formatCurrency(ctx.raw)}` } } },
            scales: {
              x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } },
              y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', callback: v => `Rs ${v.toLocaleString()}` } }
            }
          }
        });

        // Table
        const tbody = document.getElementById('report-table');
        tbody.innerHTML = expenses.length ? expenses.map(e => `
          <tr class="hover:bg-slate-800/30 transition-colors">
            <td class="py-3 text-white font-medium">${e.title}</td>
            <td class="py-3"><span class="text-xs px-2 py-0.5 rounded-full" style="background:${CAT_COLORS[e.category] || '#94a3b8'}22;color:${CAT_COLORS[e.category] || '#94a3b8'}">${CAT_ICONS[e.category] || '📦'} ${e.category}</span></td>
            <td class="py-3 text-slate-400 text-xs">${formatDate(e.date)}</td>
            <td class="py-3 text-right font-semibold mono text-white">${formatCurrency(e.amount)}</td>
          </tr>`).join('') : '<tr><td colspan="4" class="py-8 text-center text-slate-600">No expenses this month.</td></tr>';

      } catch(err) {
        showToast('Failed to load report', 'error');
      }
    }

    document.getElementById('report-month').addEventListener('change', loadReport);
    loadReport();
  </script>
</body>
</html>
